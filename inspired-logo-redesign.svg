<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <style>
      <![CDATA[
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital@0;1&display=swap');
      ]]>
    </style>

    <radialGradient id="bgGrad" cx="42%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#2c2c2c"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </radialGradient>

    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <filter id="softgrain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feComposite in="gray" in2="SourceGraphic" operator="in"/>
    </filter>

    <path id="topArc" d="M 80,300 A 220,220 0 0,1 520,300"/>
    <path id="botArc" d="M 122,415 A 210,210 0 0,0 478,415"/>
  </defs>

  <!-- ═══ BADGE BACKGROUND ═══ -->
  <circle cx="300" cy="300" r="280" fill="url(#bgGrad)"/>

  <!-- ═══ BORDER RINGS ═══ -->
  <circle cx="300" cy="300" r="274" fill="none" stroke="#C9A84C" stroke-width="3.2"/>
  <circle cx="300" cy="300" r="263" fill="none" stroke="#C9A84C" stroke-width="0.9"/>
  <circle cx="300" cy="300" r="259" fill="none" stroke="#C9A84C" stroke-width="0.3"/>

  <!-- ═══ DIAMOND ORNAMENTS (cardinal points) ═══ -->
  <polygon points="300,16 309,28 300,40 291,28" fill="#C9A84C"/>
  <polygon points="300,560 309,572 300,584 291,572" fill="#C9A84C"/>
  <polygon points="16,300 28,309 40,300 28,291" fill="#C9A84C"/>
  <polygon points="560,300 572,309 584,300 572,291" fill="#C9A84C"/>

  <!-- ═══ 4-POINTED STAR ORNAMENTS (diagonal) ═══ -->
  <g transform="translate(478,124)">
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="-4.5" y1="-4.5" x2="4.5" y2="4.5" stroke="#C9A84C" stroke-width="0.8"/>
    <line x1="4.5" y1="-4.5" x2="-4.5" y2="4.5" stroke="#C9A84C" stroke-width="0.8"/>
  </g>
  <g transform="translate(122,124)">
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="-4.5" y1="-4.5" x2="4.5" y2="4.5" stroke="#C9A84C" stroke-width="0.8"/>
    <line x1="4.5" y1="-4.5" x2="-4.5" y2="4.5" stroke="#C9A84C" stroke-width="0.8"/>
  </g>
  <g transform="translate(478,476)">
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="-4.5" y1="-4.5" x2="4.5" y2="4.5" stroke="#C9A84C" stroke-width="0.8"/>
    <line x1="4.5" y1="-4.5" x2="-4.5" y2="4.5" stroke="#C9A84C" stroke-width="0.8"/>
  </g>
  <g transform="translate(122,476)">
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="-4.5" y1="-4.5" x2="4.5" y2="4.5" stroke="#C9A84C" stroke-width="0.8"/>
    <line x1="4.5" y1="-4.5" x2="-4.5" y2="4.5" stroke="#C9A84C" stroke-width="0.8"/>
  </g>

  <!-- ═══ CURVED TEXT (top arc) ═══ -->
  <text font-family="'Playfair Display', Georgia, serif" font-size="12" fill="#C9A84C" letter-spacing="5" opacity="0.80">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">&#x2666;  STYLE  &amp;  CRAFTSMANSHIP  &#x2666;</textPath>
  </text>

  <!-- ═══ ARCH GATEWAY ═══ -->
  <!-- Outer arch stroke -->
  <path d="M 196,316 L 196,233 Q 196,149 300,149 Q 404,149 404,233 L 404,316"
        fill="none" stroke="#C9A84C" stroke-width="7.5" stroke-linecap="square"
        filter="url(#rough)"/>
  <!-- Inner accent line -->
  <path d="M 208,316 L 208,238 Q 208,164 300,164 Q 392,164 392,238 L 392,316"
        fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.45"/>
  <!-- Arch foot blocks -->
  <rect x="186" y="311" width="18" height="9" rx="1" fill="#C9A84C"/>
  <rect x="396" y="311" width="18" height="9" rx="1" fill="#C9A84C"/>
  <!-- Arch foot dots -->
  <circle cx="186" cy="311" r="3" fill="#C9A84C"/>
  <circle cx="414" cy="311" r="3" fill="#C9A84C"/>

  <!-- ═══ THREAD SPOOL ═══ -->
  <g transform="translate(300,178)">
    <!-- Left flange -->
    <rect x="-37" y="-22" width="9" height="44" rx="2.5" fill="#F5F0E8"/>
    <!-- Right flange -->
    <rect x="28" y="-22" width="9" height="44" rx="2.5" fill="#F5F0E8"/>
    <!-- Spool body outline -->
    <rect x="-28" y="-17" width="56" height="34" rx="2" fill="none" stroke="#F5F0E8" stroke-width="2.2"/>
    <!-- Thread windings -->
    <line x1="-28" y1="-8" x2="28" y2="-8" stroke="#F5F0E8" stroke-width="1.8"/>
    <line x1="-28" y1="0"  x2="28" y2="0"  stroke="#F5F0E8" stroke-width="1.8"/>
    <line x1="-28" y1="8"  x2="28" y2="8"  stroke="#F5F0E8" stroke-width="1.8"/>
    <!-- Axle pin (gold) -->
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#C9A84C" stroke-width="2.8"/>
    <circle cx="-45" cy="0" r="4" fill="#C9A84C"/>
    <circle cx="45"  cy="0" r="4" fill="#C9A84C"/>
  </g>

  <!-- Thread path: spool → needle (dashed) -->
  <path d="M 298,198 C 278,212 255,226 249,250"
        fill="none" stroke="#C9A84C" stroke-width="1.3"
        stroke-dasharray="3,4.5" opacity="0.65"/>

  <!-- ═══ SEWING MACHINE BODY ═══ -->
  <!-- Main C-arm silhouette -->
  <path d="M 196,313
           L 196,263 L 201,255 L 201,231
           C 201,215 216,209 231,209
           L 252,209 L 252,223 L 262,223 L 262,209
           L 390,209
           C 407,209 407,227 407,244
           L 407,313 Z"
        fill="#212121" stroke="#C9A84C" stroke-width="1.6"/>

  <!-- Body wave decorations -->
  <path d="M 270,238 Q 320,226 380,236"
        fill="none" stroke="#C9A84C" stroke-width="1.8" opacity="0.65"/>
  <path d="M 272,246 Q 318,236 378,244"
        fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.35"/>

  <!-- Throat plate line -->
  <line x1="262" y1="298" x2="345" y2="298" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>

  <!-- ═══ FLYWHEEL ═══ -->
  <circle cx="378" cy="261" r="33" fill="none" stroke="#F5F0E8" stroke-width="3.8"/>
  <circle cx="378" cy="261" r="20" fill="none" stroke="#F5F0E8" stroke-width="0.8" opacity="0.4"/>
  <circle cx="378" cy="261" r="11" fill="#F5F0E8"/>
  <circle cx="378" cy="261" r="4.5" fill="#212121"/>
  <!-- Spokes -->
  <line x1="378" y1="228" x2="378" y2="294" stroke="#F5F0E8" stroke-width="2.2"/>
  <line x1="345" y1="261" x2="411" y2="261" stroke="#F5F0E8" stroke-width="2.2"/>

  <!-- ═══ TENSION DISC ═══ -->
  <circle cx="336" cy="255" r="13" fill="none" stroke="#C9A84C" stroke-width="2.2"/>
  <circle cx="336" cy="255" r="5.5" fill="#C9A84C" opacity="0.8"/>

  <!-- ═══ NEEDLE BAR ═══ -->
  <rect x="237" y="223" width="9" height="88" rx="2.5" fill="#C9A84C"/>
  <!-- Presser foot arm -->
  <rect x="228" y="297" width="28" height="7" rx="2" fill="#C9A84C"/>
  <rect x="229" y="304" width="26" height="4" rx="1" fill="#C9A84C" opacity="0.65"/>
  <!-- Needle tip -->
  <path d="M 237,307 L 241.5,326 L 246,307" fill="#C9A84C"/>
  <!-- Thread guide ring -->
  <circle cx="241" cy="240" r="5" fill="none" stroke="#F5F0E8" stroke-width="1.5"/>

  <!-- ═══ MACHINE BASE BAR ═══ -->
  <rect x="181" y="313" width="243" height="12" rx="3" fill="#C9A84C"/>
  <rect x="186" y="325" width="233" height="2.5" rx="1" fill="#C9A84C" opacity="0.28"/>

  <!-- ═══ TYPOGRAPHY ═══ -->

  <!-- "INSPIRED" -->
  <text x="300" y="370"
        font-family="'Bebas Neue', Impact, 'Arial Black', sans-serif"
        font-size="72"
        fill="#F5F0E8"
        text-anchor="middle"
        letter-spacing="9">INSPIRED</text>

  <!-- ═══ DECORATIVE DIVIDER ═══ -->
  <line x1="146" y1="381" x2="226" y2="381" stroke="#C9A84C" stroke-width="1.5"/>
  <polygon points="234,375 242,381 234,387 226,381" fill="#C9A84C"/>
  <polygon points="300,376 305,381 300,386 295,381" fill="#C9A84C"/>
  <polygon points="366,375 374,381 366,387 358,381" fill="#C9A84C"/>
  <line x1="374" y1="381" x2="454" y2="381" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- "CONNOISSEUR OF STYLE AND ARTS" -->
  <text x="300" y="403"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="13"
        fill="#C9A84C"
        text-anchor="middle"
        letter-spacing="3.5">CONNOISSEUR OF STYLE AND ARTS</text>

  <!-- Thin rule -->
  <line x1="194" y1="415" x2="406" y2="415" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>

  <!-- "by Belle" -->
  <text x="300" y="438"
        font-family="'Playfair Display', Georgia, serif"
        font-size="18"
        font-style="italic"
        fill="#C9A84C"
        text-anchor="middle"
        letter-spacing="5"
        opacity="0.92">by Belle</text>

  <!-- Bottom ornament -->
  <g transform="translate(300,459)" stroke="#C9A84C" fill="#C9A84C">
    <line x1="-36" y1="0" x2="-10" y2="0" stroke-width="0.9"/>
    <polygon points="0,-5.5 5.5,0 0,5.5 -5.5,0"/>
    <line x1="10"  y1="0" x2="36"  y2="0" stroke-width="0.9"/>
  </g>

  <!-- ═══ SUBTLE GRAIN TEXTURE ═══ -->
  <circle cx="300" cy="300" r="276" fill="#9B8060" opacity="0.04" filter="url(#softgrain)"/>
</svg>
